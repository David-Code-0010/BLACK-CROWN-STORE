<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK CROWN STORE - Catálogo de Productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00d9ff;
            --secondary-color: #0099cc;
            --dark-bg: #001a33;
            --card-bg: rgba(0, 51, 102, 0.8);
            --text-light: #e0f7ff;
            --accent: #ff1493;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #001a33 0%, #003d66 25%, #005c99 50%, #003d66 75%, #001a33 100%);
            background-size: 400% 400%;
            animation: seaGradient 15s ease infinite;
            color: var(--text-light);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes seaGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efecto de agua cristalina */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 217, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
            animation: shimmer 8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Burbujas flotantes */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(0, 217, 255, 0.3) 1px, transparent 1px),
                radial-gradient(circle, rgba(0, 217, 255, 0.2) 1px, transparent 1px),
                radial-gradient(circle, rgba(0, 217, 255, 0.15) 1px, transparent 1px);
            background-size: 80px 80px, 120px 120px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: flow 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes flow {
            0% { background-position: 0 0, 40px 60px, 130px 270px; }
            100% { background-position: 80px 80px, 120px 120px, 150px 150px; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        header {
            background: rgba(0, 26, 51, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-color);
            padding: 20px 0;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
            letter-spacing: 2px;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }

        .btn-contact {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--dark-bg);
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        .btn-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.6);
        }

        /* TÍTULO */
        .section-title {
            text-align: center;
            margin-bottom: 50px;
            font-size: 42px;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
            letter-spacing: 1px;
        }

        /* GALERÍA DE PRODUCTOS */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .product-card {
            background: rgba(0, 51, 102, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.2), transparent);
            transition: left 0.5s ease;
            z-index: 1;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
            box-shadow: 0 15px 40px rgba(0, 217, 255, 0.3);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2;
        }

        .product-info {
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .product-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
        }

        .product-description {
            font-size: 14px;
            color: rgba(224, 247, 255, 0.8);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .product-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .product-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .product-checkbox label {
            cursor: pointer;
            color: var(--text-light);
        }

        /* FORMULARIO DE CONTACTO */
        .contact-form {
            background: rgba(0, 26, 51, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 15px 40px rgba(0, 217, 255, 0.2);
        }

        .form-title {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 217, 255, 0.3);
        }

        .form-group input,
        .form-group textarea {
            background: rgba(0, 102, 153, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.4);
            color: var(--text-light);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(0, 102, 153, 0.7);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
        }

        .form-group textarea {
            grid-column: 1 / -1;
            resize: vertical;
            min-height: 100px;
        }

        /* MAPA */
        .map-container {
            background: rgba(0, 26, 51, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 15px 40px rgba(0, 217, 255, 0.2);
        }

        .map-title {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            filter: brightness(0.8) contrast(1.1);
        }

        /* BOTONES DE ACCIÓN */
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--dark-bg);
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 217, 255, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 20, 147, 0.8);
            color: white;
            padding: 15px 40px;
            border: 2px solid var(--accent);
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 20, 147, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            background: rgba(255, 20, 147, 1);
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.5);
        }

        /* FOOTER */
        footer {
            background: rgba(0, 26, 51, 0.9);
            border-top: 2px solid var(--primary-color);
            padding: 30px 20px;
            text-align: center;
            color: rgba(224, 247, 255, 0.7);
            margin-top: 60px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .section-title {
                font-size: 28px;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .contact-form {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }

            .map-container iframe {
                height: 300px;
            }
        }

        /* ANIMACIÓN DE ENTRADA */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="header-content">
                <div class="logo">🖤 BLACK CROWN STORE</div>
                <div class="header-buttons">
                    <button class="btn-whatsapp" onclick="openWhatsApp()">💬 WhatsApp</button>
                    <button class="btn-contact" onclick="scrollToForm()">📋 Formulario</button>
                </div>
            </div>
        </header>

        <!-- TÍTULO -->
        <h1 class="section-title">✨ Catálogo de Productos ✨</h1>

        <!-- GALERÍA DE PRODUCTOS -->
        <div class="products-grid" id="productsGrid">
            <!-- Los productos se generarán aquí con JavaScript -->
        </div>

        <!-- FORMULARIO DE CONTACTO -->
        <div class="contact-form" id="contactForm">
            <h2 class="form-title">📝 Detalles de tu Pedido</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="Tu teléfono">
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="Tu correo">
                </div>
                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="Tu dirección">
                </div>
                <div class="form-group">
                    <label for="productos">Productos Seleccionados</label>
                    <textarea id="productos" placeholder="Se llenarán automáticamente..." readonly></textarea>
                </div>
            </div>

            <!-- MAPA -->
            <div class="map-container">
                <div class="map-title">📍 Ubicación de Entrega</div>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3360.8367896225507!2d-116.97161292345127!3d32.51502397222827!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80d92d8d8d8d8d8d%3A0x8d8d8d8d8d8d8d8d!2sTijuana%2C%20Baja%20California!5e0!3m2!1ses-ES!2smx!4v1234567890" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <div class="action-buttons">
                <button class="btn-primary" onclick="enviarPedido()">✉️ Enviar Pedido por Email</button>
                <button class="btn-secondary" onclick="contactarWhatsApp()">💬 Consultar por WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 BLACK CROWN STORE | Todos los derechos reservados</p>
        <p>Para conocer precios, contacta con la dueña 👑</p>
    </footer>

</body>
</html>
